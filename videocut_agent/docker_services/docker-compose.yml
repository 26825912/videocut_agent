version: '3.8'

services:
  # FunASR 语音识别服务
  funasr:
    build:
      context: ./funasr_service
      dockerfile: Dockerfile
    container_name: funasr-service
    ports:
      - "8001:8001"
    environment:
      - USE_GPU=true
      - LANGUAGE=zh
      # 不挂载本地模型目录，使用在线模型
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - voice-network

  # GPT-SoVITS 语音合成服务
  gpt-sovits:
    build:
      context: ./gpt_sovits_service
      dockerfile: Dockerfile
    container_name: gpt-sovits-service
    ports:
      - "9880:9880"
    volumes:
      # 持久化模型目录（首次启动自动下载，避免重启重新下载）
      - gpt-sovits-models:/app/GPT_SoVITS/pretrained_models
    environment:
      - USE_GPU=true
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9880/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
    networks:
      - voice-network

networks:
  voice-network:
    driver: bridge

volumes:
  gpt-sovits-models:
